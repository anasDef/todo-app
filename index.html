<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ==== start header ==== -->
    <header class="header">
      <!-- if you don't know what is <picture> visit this link (https://www.w3schools.com/tags/tag_picture.asp) -->
      <picture>
        <source
          id="background-image-mobile"
          media="(max-width: 768px)"
          srcset="./images/bg-mobile-dark.jpg"
        />
        <img
          src="images/bg-desktop-dark.jpg"
          alt="background"
          id="background-image"
        />
      </picture>
    </header>
    <!-- ==== end header ==== -->

    <!-- ==== start main content ==== -->
    <main class="app">
      <!-- app header -->
      <header class="app__header">
        <h1 class="app__title">TODO</h1>

        <button class="app__theme-btn" id="toggle-theme-btn">
          <img
            src="images/icon-sun.svg"
            alt="sun icon"
            id="toggle-theme-btn-icon"
          />
        </button>
      </header>

      <!-- container for input -->
      <section class="app__input-container">
        <input
          type="text"
          class="app__input"
          id="todo-input"
          placeholder="Create a new todo.."
        />
        <button class="app__button" id="add-button">Add</button>
      </section>

      <!-- todo container -->
      <section class="app__todos-container">
        <ul class="app__todos-list" id="todos-list"></ul>

        <!-- app controls -->
        <div class="app__controls">
          <span class="app__todo-left" id="todos-left">0 items left</span>
          <div>
            <button class="app__button app__button--active" id="show-all-btn">
              All
            </button>
            <button class="app__button" id="show-active-btn">Active</button>
            <button class="app__button" id="show-completed-btn">
              Completed
            </button>
          </div>
          <button class="app__button" id="clear-completed">
            Clear completed
          </button>
        </div>
      </section>
    </main>
    <!-- ==== end main content ==== -->

    <script src="main.js"></script>
  </body>
</html>
